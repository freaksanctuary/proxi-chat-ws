version: '3.9'

services:
  redis:
    image: redis:alpine

  next:
    build: ./nextjs16
    expose:
      - "3000"
    depends_on:
      - redis

  websocket:
    build: ./websocket
    restart: on-failure
    expose:
      - "8000"
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - next
      - websocket
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf